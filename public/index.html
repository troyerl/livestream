<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shared Stream Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #121212;
        color: #ffffff;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        overflow: hidden;
      }
      #workspace {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      .video-wrapper {
        position: absolute;
        width: 480px;
        height: 270px;
        background: #000;
        border: 2px solid #444;
        border-radius: 8px;
        cursor: move;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      }
      .video-header {
        background: #222;
        padding: 6px 10px;
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        user-select: none;
        font-weight: bold;
        border-top-left-radius: 6px;
        border-top-right-radius: 6px;
      }
      .video-container {
        width: 100%;
        height: calc(100% - 28px);
        pointer-events: auto;
      }
      .dragging .video-container {
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="workspace">
      <div id="card1" class="video-wrapper" style="top: 40px; left: 40px">
        <div class="video-header">Stream Alpha (Drag Me)</div>
        <div id="player1" class="video-container"></div>
      </div>

      <div id="card2" class="video-wrapper" style="top: 40px; left: 550px">
        <div class="video-header">Stream Beta (Drag Me)</div>
        <div id="player2" class="video-container"></div>
      </div>
    </div>

    <script>
      const socket = io();
      let player1, player2;
      let isInitialLoad = true;

      // Load YouTube API script asynchronously
      const tag = document.createElement("script");
      tag.src = "https://www.youtube.com/iframe_api";
      const firstScriptTag = document.getElementsByTagName("script")[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

      function onYouTubeIframeAPIReady() {
        player1 = new YT.Player("player1", {
          videoId: "",
          playerVars: { autoplay: 1, controls: 1 },
        });
        player2 = new YT.Player("player2", {
          videoId: "",
          playerVars: { autoplay: 1, controls: 1 },
        });
      }

      // Handshake initialization
      socket.on("initial-state", (state) => {
        if (isInitialLoad && player1 && player2) {
          setTimeout(() => {
            player1.cueVideoById(state.video1);
            player2.cueVideoById(state.video2);
            isInitialLoad = false;
          }, 1000);
        }
      });

      // Listen for changes pushed from Admin panel
      socket.on("streams-updated", (state) => {
        player1.loadVideoById(state.video1);
        player2.loadVideoById(state.video2);
      });

      // Listen for Sync signals pushed from Admin panel
      socket.on("force-client-sync", (state) => {
        if (player1 && player1.seekTo)
          player1.seekTo(state.lastKnownTime1, true);
        if (player2 && player2.seekTo)
          player2.seekTo(state.lastKnownTime2, true);
      });

      // Client-side Local Dragging
      const cards = document.querySelectorAll(".video-wrapper");
      cards.forEach((card) => {
        const header = card.querySelector(".video-header");
        let isDragging = false;
        let startX, startY, initialLeft, initialTop;

        header.addEventListener("mousedown", (e) => {
          isDragging = true;
          card.classList.add("dragging");
          startX = e.clientX;
          startY = e.clientY;
          initialLeft = parseInt(card.style.left, 10);
          initialTop = parseInt(card.style.top, 10);
        });

        document.addEventListener("mousemove", (e) => {
          if (!isDragging) return;
          const dx = e.clientX - startX;
          const dy = e.clientY - startY;
          card.style.left = `${initialLeft + dx}px`;
          card.style.top = `${initialTop + dy}px`;
        });

        document.addEventListener("mouseup", () => {
          if (isDragging) {
            isDragging = false;
            card.classList.remove("dragging");
          }
        });
      });
    </script>
  </body>
</html>
