<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shared Stream Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #121212;
        color: #ffffff;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        overflow: hidden;
      }
      #workspace {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      .video-wrapper {
        position: absolute;
        min-width: 200px;
        min-height: 150px;
        background: #000;
        border: 2px solid #444;
        border-radius: 8px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
      }
      .video-header {
        background: #222;
        padding: 6px 10px;
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        user-select: none;
        font-weight: bold;
        border-top-left-radius: 6px;
        border-top-right-radius: 6px;
        cursor: move;
      }
      .header-controls {
        display: flex;
        gap: 6px;
      }
      .control-btn {
        background: #333;
        border: 1px solid #555;
        color: #fff;
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 3px;
        cursor: pointer;
      }
      .control-btn:hover {
        background: #444;
      }
      .video-container {
        width: 100%;
        flex-grow: 1;
        pointer-events: auto;
      }
      /* Invisible blocker overlay during resize/drag to prevent iframe fighting */
      .interacting .video-container {
        pointer-events: none;
      }

      /* Custom Resize Handle (Bottom-Right Corner) */
      .resize-handle {
        position: absolute;
        width: 15px;
        height: 15px;
        right: 0;
        bottom: 0;
        cursor: se-resize;
        background: linear-gradient(135deg, transparent 50%, #555 50%);
        border-bottom-right-radius: 6px;
      }

      /* Fill Screen state applied entirely on the client side */
      .filled-screen {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        z-index: 9999;
        border: none;
        border-radius: 0;
      }
      .filled-screen .video-header {
        border-radius: 0;
      }
      .filled-screen .resize-handle {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="workspace">
      <div
        id="card1"
        class="video-wrapper"
        style="top: 0px; left: 0px; width: 50vw; height: 100vh"
      >
        <div class="video-header">
          <span>Stream Alpha</span>
          <div class="header-controls">
            <button class="control-btn" onclick="toggleMute('player1', this)">
              Mute
            </button>
            <button class="control-btn" onclick="toggleFill('card1', this)">
              Fill Screen
            </button>
          </div>
        </div>
        <div id="player1" class="video-container"></div>
        <div class="resize-handle"></div>
      </div>

      <div
        id="card2"
        class="video-wrapper"
        style="top: 0px; left: 50vw; width: 50vw; height: 100vh"
      >
        <div class="video-header">
          <span>Stream Beta</span>
          <div class="header-controls">
            <button class="control-btn" onclick="toggleMute('player2', this)">
              Mute
            </button>
            <button class="control-btn" onclick="toggleFill('card2', this)">
              Fill Screen
            </button>
          </div>
        </div>
        <div id="player2" class="video-container"></div>
        <div class="resize-handle"></div>
      </div>
    </div>

    <script>
      const socket = io();
      let players = {};
      let isInitialLoad = true;

      // Load YouTube API script asynchronously
      const tag = document.createElement("script");
      tag.src = "https://www.youtube.com/iframe_api";
      const firstScriptTag = document.getElementsByTagName("script")[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

      function onYouTubeIframeAPIReady() {
        players["player1"] = new YT.Player("player1", {
          videoId: "",
          playerVars: { autoplay: 1, controls: 1 },
        });
        players["player2"] = new YT.Player("player2", {
          videoId: "",
          playerVars: { autoplay: 1, controls: 1 },
        });
      }

      socket.on("initial-state", (state) => {
        if (isInitialLoad && players["player1"] && players["player2"]) {
          setTimeout(() => {
            players["player1"].cueVideoById(state.video1);
            players["player2"].cueVideoById(state.video2);
            isInitialLoad = false;
          }, 1000);
        }
      });

      socket.on("streams-updated", (state) => {
        players["player1"].loadVideoById(state.video1);
        players["player2"].loadVideoById(state.video2);
      });

      socket.on("force-client-sync", (state) => {
        if (players["player1"] && players["player1"].seekTo)
          players["player1"].seekTo(state.lastKnownTime1, true);
        if (players["player2"] && players["player2"].seekTo)
          players["player2"].seekTo(state.lastKnownTime2, true);
      });

      // Local Volume Mute Functionality
      function toggleMute(playerId, button) {
        const player = players[playerId];
        if (!player || !player.isMuted) return;

        if (player.isMuted()) {
          player.unMute();
          button.innerText = "Mute";
          button.style.background = "#333";
        } else {
          player.mute();
          button.innerText = "Unmute";
          button.style.background = "#d32f2f";
        }
      }

      // Local Maximize Window / Fill Screen Toggle
      function toggleFill(cardId, button) {
        const card = document.getElementById(cardId);
        if (card.classList.contains("filled-screen")) {
          card.classList.remove("filled-screen");
          button.innerText = "Fill Screen";
        } else {
          card.classList.add("filled-screen");
          button.innerText = "Exit Fill";
        }
      }

      // Client-side Draggable and Resizable Logic
      const cards = document.querySelectorAll(".video-wrapper");
      cards.forEach((card) => {
        const header = card.querySelector(".video-header");
        const handle = card.querySelector(".resize-handle");

        let isDragging = false;
        let isResizing = false;
        let startX,
          startY,
          initialLeft,
          initialTop,
          initialWidth,
          initialHeight;

        // Drag Configuration
        header.addEventListener("mousedown", (e) => {
          if (
            e.target.tagName === "BUTTON" ||
            card.classList.contains("filled-screen")
          )
            return;
          isDragging = true;
          card.classList.add("interacting");
          startX = e.clientX;
          startY = e.clientY;

          // Parse current computed layouts dynamically so it transitions clean from percentages to raw pixels
          initialLeft = card.offsetLeft;
          initialTop = card.offsetTop;
        });

        // Resize Configuration
        handle.addEventListener("mousedown", (e) => {
          e.preventDefault();
          if (card.classList.contains("filled-screen")) return;
          isResizing = true;
          card.classList.add("interacting");
          startX = e.clientX;
          startY = e.clientY;
          initialWidth = card.offsetWidth;
          initialHeight = card.offsetHeight;
        });

        // Global Movement Tracking
        document.addEventListener("mousemove", (e) => {
          if (isDragging) {
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            card.style.left = `${initialLeft + dx}px`;
            card.style.top = `${initialTop + dy}px`;
          }

          if (isResizing) {
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            card.style.width = `${initialWidth + dx}px`;
            card.style.height = `${initialHeight + dy}px`;
          }
        });

        // Handle Mouse Release
        document.addEventListener("mouseup", () => {
          isDragging = false;
          isResizing = false;
          card.classList.remove("interacting");
        });
      });
    </script>
  </body>
</html>
