<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shared Stream Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #121212;
        color: #ffffff;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        overflow: hidden;
      }
      #workspace {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      .video-wrapper {
        position: absolute;
        min-width: 200px;
        min-height: 150px;
        background: #000;
        border: 2px solid #444;
        border-radius: 8px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
      }
      .video-header {
        background: #222;
        padding: 6px 10px;
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        user-select: none;
        font-weight: bold;
        border-top-left-radius: 6px;
        border-top-right-radius: 6px;
        cursor: move;
      }
      .header-controls {
        display: flex;
        gap: 6px;
      }
      .control-btn {
        background: #d32f2f;
        border: 1px solid #555;
        color: #fff;
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 3px;
        cursor: pointer;
      }
      .control-btn:hover {
        background: #b71c1c;
      }
      .video-container {
        width: 100%;
        flex-grow: 1;
        /* Block all hover/click interaction with the YouTube iframe */
        pointer-events: none;
      }

      .resize-handle {
        position: absolute;
        width: 15px;
        height: 15px;
        right: 0;
        bottom: 0;
        cursor: se-resize;
        background: linear-gradient(135deg, transparent 50%, #555 50%);
        border-bottom-right-radius: 6px;
      }

      .filled-screen {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        z-index: 9999;
        border: none;
        border-radius: 0;
      }
      .filled-screen .video-header {
        border-radius: 0;
      }
      .filled-screen .resize-handle {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="workspace">
      <div
        id="card1"
        class="video-wrapper"
        style="top: 0px; left: 0px; width: 50vw; height: 100vh"
      >
        <div class="video-header">
          <span>Stream Alpha</span>
          <div class="header-controls">
            <button class="control-btn" onclick="toggleMute('player1', this)">
              Unmute
            </button>
            <button
              class="control-btn"
              style="background: #333"
              onclick="toggleFill('card1', this)"
            >
              Fill Screen
            </button>
          </div>
        </div>
        <div id="player1" class="video-container"></div>
        <div class="resize-handle"></div>
      </div>

      <div
        id="card2"
        class="video-wrapper"
        style="top: 0px; left: 50vw; width: 50vw; height: 100vh"
      >
        <div class="video-header">
          <span>Stream Beta</span>
          <div class="header-controls">
            <button class="control-btn" onclick="toggleMute('player2', this)">
              Unmute
            </button>
            <button
              class="control-btn"
              style="background: #333"
              onclick="toggleFill('card2', this)"
            >
              Fill Screen
            </button>
          </div>
        </div>
        <div id="player2" class="video-container"></div>
        <div class="resize-handle"></div>
      </div>
    </div>

    <script>
      const socket = io();
      let players = {};
      let pendingVideoIds = { player1: null, player2: null };
      let playersReadyStatus = { player1: false, player2: false };

      // Load YouTube API script asynchronously
      const tag = document.createElement("script");
      tag.src = "https://www.youtube.com/iframe_api";
      const firstScriptTag = document.getElementsByTagName("script")[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

      function onYouTubeIframeAPIReady() {
        // We pass explicitly monitored event callbacks to guarantee safety
        players["player1"] = new YT.Player("player1", {
          playerVars: {
            autoplay: 1,
            controls: 0,
            mute: 1,
            rel: 0,
            disablekb: 1,
            modestbranding: 1,
          },
          events: { onReady: (e) => onPlayerReady("player1") },
        });
        players["player2"] = new YT.Player("player2", {
          playerVars: {
            autoplay: 1,
            controls: 0,
            mute: 1,
            rel: 0,
            disablekb: 1,
            modestbranding: 1,
          },
          events: { onReady: (e) => onPlayerReady("player2") },
        });
      }

      // This runs ONLY when the iframe has completely loaded and is listening for actions
      function onPlayerReady(playerId) {
        playersReadyStatus[playerId] = true;

        // If we received the stream IDs from the server while waiting, load them now
        if (pendingVideoIds[playerId]) {
          players[playerId].loadVideoById(pendingVideoIds[playerId]);
          pendingVideoIds[playerId] = null;
        }
      }

      // Catch initial server load state safely
      socket.on("initial-state", (state) => {
        // Process Stream 1
        if (playersReadyStatus["player1"]) {
          players["player1"].loadVideoById(state.video1);
        } else {
          pendingVideoIds["player1"] = state.video1;
        }

        // Process Stream 2
        if (playersReadyStatus["player2"]) {
          players["player2"].loadVideoById(state.video2);
        } else {
          pendingVideoIds["player2"] = state.video2;
        }

        // Adopt any persistent delay the server already has configured
        delayOffset["player1"] = Number(state.delay1) || 0;
        delayOffset["player2"] = Number(state.delay2) || 0;
        // Give the freshly loaded video a moment before seeking back
        setTimeout(() => {
          applyDelay("player1");
          applyDelay("player2");
        }, 2000);
      });

      // Handle Admin mid-session feed changes
      socket.on("streams-updated", (state) => {
        if (playersReadyStatus["player1"])
          players["player1"].loadVideoById(state.video1);
        if (playersReadyStatus["player2"])
          players["player2"].loadVideoById(state.video2);
      });

      socket.on("force-client-sync", (state) => {
        if (playersReadyStatus["player1"] && players["player1"].seekTo)
          players["player1"].seekTo(state.lastKnownTime1, true);
        if (playersReadyStatus["player2"] && players["player2"].seekTo)
          players["player2"].seekTo(state.lastKnownTime2, true);
      });

      // Persistent delay buffer: how many seconds behind the live edge each
      // stream should stay. Admin commands add to this, and a maintenance loop
      // continuously holds the player at that offset so YouTube can't snap it
      // back toward live.
      let delayOffset = { player1: 0, player2: 0 };

      socket.on("delay-updated", (data) => {
        const playerId = data.stream === 2 ? "player2" : "player1";
        delayOffset[playerId] = Number(data.seconds) || 0;
        applyDelay(playerId);
      });

      function liveEdgeFor(player) {
        // For live streams getDuration() reports the current live edge; for a
        // normal video it's the full length. Either way it's our reference end.
        const edge = player.getDuration ? player.getDuration() : 0;
        return edge && edge > 0 ? edge : null;
      }

      function applyDelay(playerId) {
        const player = players[playerId];
        if (!playersReadyStatus[playerId] || !player || !player.seekTo) return;

        const offset = delayOffset[playerId];
        const edge = liveEdgeFor(player);
        const base = edge !== null ? edge : player.getCurrentTime();
        const target = base - offset; // offset 0 seeks back to the live edge
        player.seekTo(target > 0 ? target : 0, true);
      }

      // Maintenance loop keeps the configured delay persistent. If a stream
      // drifts back toward the live edge (buffering, auto catch-up, etc.) we
      // push it back to the intended offset.
      setInterval(() => {
        ["player1", "player2"].forEach((playerId) => {
          const player = players[playerId];
          const offset = delayOffset[playerId];
          if (
            offset <= 0 ||
            !playersReadyStatus[playerId] ||
            !player ||
            !player.seekTo
          )
            return;

          const edge = liveEdgeFor(player);
          if (edge === null) return;

          const target = edge - offset;
          const current = player.getCurrentTime();
          // Only correct meaningful drift toward live to avoid constant seeking.
          if (current > target + 1.5) {
            player.seekTo(target > 0 ? target : 0, true);
          }
        });
      }, 2000);

      // Local Volume Toggle
      function toggleMute(playerId, button) {
        const player = players[playerId];
        if (!playersReadyStatus[playerId] || !player || !player.isMuted) return;

        if (player.isMuted()) {
          player.unMute();
          button.innerText = "Mute";
          button.style.background = "#333";
        } else {
          player.mute();
          button.innerText = "Unmute";
          button.style.background = "#d32f2f";
        }
      }

      // Local Maximize Window / Fill Screen Toggle
      function toggleFill(cardId, button) {
        const card = document.getElementById(cardId);
        if (card.classList.contains("filled-screen")) {
          card.classList.remove("filled-screen");
          button.innerText = "Fill Screen";
        } else {
          card.classList.add("filled-screen");
          button.innerText = "Exit Fill";
        }
      }

      // Client-side Draggable and Resizable Framework
      const cards = document.querySelectorAll(".video-wrapper");
      cards.forEach((card) => {
        const header = card.querySelector(".video-header");
        const handle = card.querySelector(".resize-handle");

        let isDragging = false;
        let isResizing = false;
        let startX,
          startY,
          initialLeft,
          initialTop,
          initialWidth,
          initialHeight;

        header.addEventListener("mousedown", (e) => {
          if (
            e.target.tagName === "BUTTON" ||
            card.classList.contains("filled-screen")
          )
            return;
          isDragging = true;
          card.classList.add("interacting");
          startX = e.clientX;
          startY = e.clientY;
          initialLeft = card.offsetLeft;
          initialTop = card.offsetTop;
        });

        handle.addEventListener("mousedown", (e) => {
          e.preventDefault();
          if (card.classList.contains("filled-screen")) return;
          isResizing = true;
          card.classList.add("interacting");
          startX = e.clientX;
          startY = e.clientY;
          initialWidth = card.offsetWidth;
          initialHeight = card.offsetHeight;
        });

        document.addEventListener("mousemove", (e) => {
          if (isDragging) {
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            card.style.left = `${initialLeft + dx}px`;
            card.style.top = `${initialTop + dy}px`;
          }

          if (isResizing) {
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            card.style.width = `${initialWidth + dx}px`;
            card.style.height = `${initialHeight + dy}px`;
          }
        });

        document.addEventListener("mouseup", () => {
          isDragging = false;
          isResizing = false;
          card.classList.remove("interacting");
        });
      });
    </script>
  </body>
</html>
