<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Broadcast Control</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
      body {
        background-color: #1a1a1a;
        color: #fff;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        padding: 30px;
        margin: 0;
      }
      .control-panel {
        max-width: 600px;
        background: #2a2a2a;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      }
      h1 {
        margin-top: 0;
        color: #ff3333;
        font-size: 24px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-size: 14px;
        color: #ccc;
      }
      input[type="text"] {
        width: 100%;
        padding: 10px;
        background: #3a3a3a;
        border: 1px solid #555;
        color: #fff;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      .btn-update {
        background-color: #0070f3;
        color: white;
        margin-right: 10px;
      }
      .btn-update:hover {
        background-color: #0051a8;
      }
      .btn-sync {
        background-color: #e00000;
        color: white;
      }
      .btn-sync:hover {
        background-color: #aa0000;
      }
      #status-msg {
        margin-top: 15px;
        font-size: 14px;
        color: #00ff00;
      }

      /* Keeps admin instance tracking players active but hidden visually */
      #admin-tracking-players {
        position: absolute;
        left: -9999px;
        top: -9999px;
        width: 1px;
        height: 1px;
      }
    </style>
  </head>
  <body>
    <div class="control-panel">
      <h1>Live Stream Admin Command Room</h1>

      <div class="form-group">
        <label for="vid1-input">Stream Alpha YouTube Video ID:</label>
        <input type="text" id="vid1-input" placeholder="e.g., 5qap5aO4i9A" />
      </div>

      <div class="form-group">
        <label for="vid2-input">Stream Beta YouTube Video ID:</label>
        <input type="text" id="vid2-input" placeholder="e.g., DWcJYXZMnbc" />
      </div>

      <button class="btn-update" onclick="updateStreams()">
        Update Feeds for Everyone
      </button>
      <button class="btn-sync" onclick="triggerAdminSync()">
        Force Sync All Viewers
      </button>

      <div id="status-msg"></div>
    </div>

    <div id="admin-tracking-players">
      <div id="player1"></div>
      <div id="player2"></div>
    </div>

    <script>
      const socket = io();
      let player1, player2;

      // Load YouTube API script asynchronously
      const tag = document.createElement("script");
      tag.src = "https://www.youtube.com/iframe_api";
      const firstScriptTag = document.getElementsByTagName("script")[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

      function onYouTubeIframeAPIReady() {
        player1 = new YT.Player("player1", {
          videoId: "",
          playerVars: { muted: 1, controls: 0 },
        });
        player2 = new YT.Player("player2", {
          videoId: "",
          playerVars: { muted: 1, controls: 0 },
        });
      }

      socket.on("initial-state", (state) => {
        document.getElementById("vid1-input").value = state.video1;
        document.getElementById("vid2-input").value = state.video2;
        setTimeout(() => {
          if (player1 && player2) {
            player1.cueVideoById(state.video1);
            player2.cueVideoById(state.video2);
          }
        }, 1000);
      });

      socket.on("streams-updated", (state) => {
        player1.loadVideoById(state.video1);
        player2.loadVideoById(state.video2);
      });

      function updateStreams() {
        const v1 = document.getElementById("vid1-input").value;
        const v2 = document.getElementById("vid2-input").value;
        socket.emit("admin-change-streams", { video1: v1, video2: v2 });
        showStatus("Stream sources updated globally!");
      }

      function triggerAdminSync() {
        if (!player1 || !player2 || !player1.getCurrentTime) return;

        const syncPayload = {
          time1: player1.getCurrentTime(),
          time2: player2.getCurrentTime(),
        };
        socket.emit("admin-sync-command", syncPayload);
        showStatus("Sent timeline synchronization down to viewers!");
      }

      function showStatus(msg) {
        const div = document.getElementById("status-msg");
        div.innerText = msg;
        setTimeout(() => {
          div.innerText = "";
        }, 4000);
      }
    </script>
  </body>
</html>
