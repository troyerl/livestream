<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Broadcast Control</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
      body {
        background-color: #1a1a1a;
        color: #fff;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        padding: 30px;
        margin: 0;
      }
      .control-panel {
        max-width: 600px;
        background: #2a2a2a;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      }
      h1 {
        margin-top: 0;
        color: #ff3333;
        font-size: 24px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-size: 14px;
        color: #ccc;
      }
      input[type="text"] {
        width: 100%;
        padding: 10px;
        background: #3a3a3a;
        border: 1px solid #555;
        color: #fff;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      .btn-update {
        background-color: #0070f3;
        color: white;
        margin-right: 10px;
      }
      .btn-update:hover {
        background-color: #0051a8;
      }
      .btn-sync {
        background-color: #e00000;
        color: white;
      }
      .btn-sync:hover {
        background-color: #aa0000;
      }
      .delay-controls {
        margin-top: 15px;
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }
      .delay-group label {
        margin-bottom: 6px;
      }
      .delay-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .delay-row input[type="number"] {
        width: 80px;
        padding: 10px;
        background: #3a3a3a;
        border: 1px solid #555;
        color: #fff;
        border-radius: 4px;
        box-sizing: border-box;
      }
      .btn-delay {
        background-color: #ff9800;
        color: #1a1a1a;
      }
      .btn-delay:hover {
        background-color: #e68900;
      }
      #status-msg {
        margin-top: 15px;
        font-size: 14px;
        color: #00ff00;
      }
      .time-readout {
        margin-top: 25px;
        border-top: 1px solid #444;
        padding-top: 15px;
      }
      .time-readout h2 {
        font-size: 16px;
        color: #ccc;
        margin: 0 0 12px;
      }
      .stream-time {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        background: #333;
        padding: 10px 12px;
        border-radius: 4px;
        margin-bottom: 8px;
      }
      .stream-time .name {
        font-weight: bold;
        color: #ff9800;
      }
      .stream-time .times {
        font-variant-numeric: tabular-nums;
        font-size: 14px;
        color: #ddd;
      }
      .stream-time .times .target {
        color: #00e676;
        font-weight: bold;
      }
      .stream-time .delay-tag {
        font-size: 12px;
        color: #aaa;
      }

      /* Keeps admin instance tracking players active but hidden visually */
      #admin-tracking-players {
        position: absolute;
        left: -9999px;
        top: -9999px;
        width: 1px;
        height: 1px;
      }
    </style>
  </head>
  <body>
    <div class="control-panel">
      <h1>Live Stream Admin Command Room</h1>

      <div class="form-group">
        <label for="vid1-input">Main Stream YouTube Video ID:</label>
        <input type="text" id="vid1-input" placeholder="e.g., 5qap5aO4i9A" />
      </div>

      <div class="form-group">
        <label for="vid2-input">Driver Stream YouTube Video ID:</label>
        <input type="text" id="vid2-input" placeholder="e.g., DWcJYXZMnbc" />
      </div>

      <button class="btn-update" onclick="updateStreams()">
        Update Feeds for Everyone
      </button>
      <button class="btn-sync" onclick="triggerAdminSync()">
        Force Sync All Viewers
      </button>

      <div class="delay-controls">
        <div class="delay-group">
          <label for="delay1-input">Main Stream delay (s)</label>
          <div class="delay-row">
            <input type="number" id="delay1-input" min="0" step="1" value="0" />
            <button class="btn-delay" onclick="setDelay(1)">Apply</button>
          </div>
        </div>
        <div class="delay-group">
          <label for="delay2-input">Driver Stream delay (s)</label>
          <div class="delay-row">
            <input type="number" id="delay2-input" min="0" step="1" value="0" />
            <button class="btn-delay" onclick="setDelay(2)">Apply</button>
          </div>
        </div>
      </div>

      <div id="status-msg"></div>

      <div class="time-readout">
        <h2>Stream Timeline (where viewers should be)</h2>
        <div class="stream-time">
          <span class="name">Main Stream</span>
          <span class="times">
            Live: <span id="live1">--:--</span>
            &nbsp;|&nbsp; Target: <span class="target" id="target1">--:--</span>
            <span class="delay-tag" id="delay1">(no delay)</span>
          </span>
        </div>
        <div class="stream-time">
          <span class="name">Driver Stream</span>
          <span class="times">
            Live: <span id="live2">--:--</span>
            &nbsp;|&nbsp; Target: <span class="target" id="target2">--:--</span>
            <span class="delay-tag" id="delay2">(no delay)</span>
          </span>
        </div>
      </div>
    </div>

    <div id="admin-tracking-players">
      <div id="player1"></div>
      <div id="player2"></div>
    </div>

    <script>
      const socket = io();
      let player1, player2;
      // Cumulative delay (seconds) the admin has applied to each stream.
      // Mirrors the persistent buffer running on every viewer.
      let delayOffset = { 1: 0, 2: 0 };

      // Load YouTube API script asynchronously
      const tag = document.createElement("script");
      tag.src = "https://www.youtube.com/iframe_api";
      const firstScriptTag = document.getElementsByTagName("script")[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

      function onYouTubeIframeAPIReady() {
        player1 = new YT.Player("player1", {
          videoId: "",
          playerVars: { muted: 1, controls: 0 },
        });
        player2 = new YT.Player("player2", {
          videoId: "",
          playerVars: { muted: 1, controls: 0 },
        });
      }

      socket.on("initial-state", (state) => {
        document.getElementById("vid1-input").value = state.video1;
        document.getElementById("vid2-input").value = state.video2;

        // Adopt the persisted delay so the readout/inputs survive reloads
        applyDelayState(1, Number(state.delay1) || 0);
        applyDelayState(2, Number(state.delay2) || 0);

        setTimeout(() => {
          if (player1 && player2) {
            // Load (and play) so the tracking players report live timestamps
            player1.loadVideoById(state.video1);
            player2.loadVideoById(state.video2);
          }
        }, 1000);
      });

      socket.on("streams-updated", (state) => {
        player1.loadVideoById(state.video1);
        player2.loadVideoById(state.video2);
      });

      // Keep this admin in sync if the delay is changed elsewhere
      socket.on("delay-updated", (data) => {
        applyDelayState(data.stream, Number(data.seconds) || 0);
      });

      function applyDelayState(stream, seconds) {
        delayOffset[stream] = seconds;
        const input = document.getElementById(`delay${stream}-input`);
        if (input && document.activeElement !== input) input.value = seconds;
      }

      function updateStreams() {
        const v1 = document.getElementById("vid1-input").value;
        const v2 = document.getElementById("vid2-input").value;
        socket.emit("admin-change-streams", { video1: v1, video2: v2 });
        showStatus("Stream sources updated globally!");
      }

      function triggerAdminSync() {
        if (!player1 || !player2 || !player1.getCurrentTime) return;

        const syncPayload = {
          time1: player1.getCurrentTime(),
          time2: player2.getCurrentTime(),
        };
        socket.emit("admin-sync-command", syncPayload);
        showStatus("Sent timeline synchronization down to viewers!");
      }

      function setDelay(stream) {
        const input = document.getElementById(`delay${stream}-input`);
        let seconds = Number(input.value);
        if (!isFinite(seconds) || seconds < 0) seconds = 0;
        input.value = seconds;

        socket.emit("admin-set-delay", { stream: stream, seconds: seconds });
        delayOffset[stream] = seconds;
        const name = stream === 1 ? "Main" : "Driver";
        showStatus(`Set Stream ${name} delay to ${seconds}s for all viewers!`);
      }

      function formatTime(seconds) {
        if (!isFinite(seconds) || seconds < 0) return "--:--";
        const total = Math.floor(seconds);
        const m = Math.floor(total / 60);
        const s = total % 60;
        return `${m}:${String(s).padStart(2, "0")}`;
      }

      function updateTimeReadout(stream, player) {
        if (!player || !player.getCurrentTime) return;
        const live = player.getCurrentTime();
        const offset = delayOffset[stream];
        const target = live - offset;

        document.getElementById(`live${stream}`).innerText = formatTime(live);
        document.getElementById(`target${stream}`).innerText =
          formatTime(target);
        document.getElementById(`delay${stream}`).innerText =
          offset > 0 ? `(−${offset}s behind live)` : "(no delay)";
      }

      // Refresh the timeline readout once per second
      setInterval(() => {
        updateTimeReadout(1, player1);
        updateTimeReadout(2, player2);
      }, 1000);

      function showStatus(msg) {
        const div = document.getElementById("status-msg");
        div.innerText = msg;
        setTimeout(() => {
          div.innerText = "";
        }, 4000);
      }
    </script>
  </body>
</html>
